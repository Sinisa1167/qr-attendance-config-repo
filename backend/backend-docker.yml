server:
  port: 8081
spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:qrattendance}
    username: ${POSTGRES_USER:qruser}
    password: ${POSTGRES_PASSWORD:qrpassword123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/qr-attendance/protocol/openid-connect/certs
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
app:
  qr-secret: ${QR_SECRET}
  qr-refresh-interval: ${QR_REFRESH_INTERVAL}
  attendance:
    threshold: ${ATTENDANCE_THRESHOLD}
  student-email-domain: ${STUDENT_EMAIL_DOMAIN}
  employee-email-domain: ${EMPLOYEE_EMAIL_DOMAIN}
