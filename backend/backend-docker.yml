spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:qrattendance}
    username: ${POSTGRES_USER:qruser}
    password: ${POSTGRES_PASSWORD:qrpassword123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:qr-attendance}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

app:
  qr-refresh-interval: ${QR_REFRESH_INTERVAL:30000}
  attendance:
    threshold: ${ATTENDANCE_THRESHOLD:70.0}
  student-email-domain: ${STUDENT_EMAIL_DOMAIN:student.etf.unibl.org}
